<title>Kingshot – Apps no Google Play</title>
<link rel="stylesheet" href="style.css">
<style>
@font-face { font-family: 'Google Sans'; font-style: normal; font-weight: 400; src: local('Segoe UI'), local('Roboto'); }
@font-face { font-family: 'Google Sans'; font-style: normal; font-weight: 500; src: local('Segoe UI Semibold'), local('Roboto Medium'); }
@font-face { font-family: 'Google Sans Display'; font-style: normal; font-weight: 400; src: local('Segoe UI'), local('Roboto'); }
/* ---- page container (fullscreened) ---- */
#pageContainer { background:#fff; }
#pageContainer:fullscreen, #pageContainer:-webkit-full-screen { background:#fff; overflow:auto; }
/* push play store header below url bar */
#pageContainer .top-header { top: 30px; }
/* ---- fake url bar ---- */
.url-bar { background:#1a1a2e; color:#e0e0e0; padding:6px 12px; font-size:12px; display:flex; align-items:center; gap:8px; font-family: 'Google Sans', Roboto, Arial, sans-serif; user-select:none; position:fixed; top:0; z-index:1001; width:100%; max-width:480px; left:50%; transform:translateX(-50%); box-sizing:border-box; }
.url-bar .url-text { flex:1; background:#0d0d1a; border-radius:16px; padding:5px 14px; color:#b0b8c1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:11px; min-width:0; }
.url-bar .lock { color:#4caf50; font-size:14px; flex-shrink:0; }
/* ---- notification modal ---- */
.modal-overlay { display:flex !important; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:99999; align-items:center; justify-content:center; }
.modal-box { background:#fff; border-radius:12px; padding:24px; max-width:340px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.3); text-align:center; font-family: 'Google Sans', Roboto, Arial, sans-serif; margin:0; }
.modal-box .bell { font-size:48px; margin-bottom:12px; line-height:1; display:block; }
.modal-box h2 { font-size:18px; margin:0 0 8px 0; color:#202124; line-height:1.3; font-weight:500; border:none; padding:0; }
.modal-box p { font-size:13px; color:#5f6368; margin:0 0 20px 0; line-height:1.4; padding:0; }
.modal-box .btn-allow { display:block; width:100%; padding:12px; background:#1a73e8; color:#fff; border:none; border-radius:24px; font-size:15px; font-weight:500; cursor:pointer; text-transform:none; letter-spacing:normal; margin:0; }
.modal-box .btn-allow:hover { background:#1557b0; }
/* ---- hidden content until fullscreen ---- */
#content { display:none; }
#content.show { display:block; }
</style>
</head>
<body>
<div id="pageContainer">
  <div class="url-bar"><span class="lock">🔒</span><div class="url-text">https://play.google.com/store/apps/details?id=com.glykka.easysign&amp;hl=pt_BR</div></div>

  return `<div class="screenshots-wrapper"><div class="screenshots-scroll">${c.screenshots.map(s => `<img src="${s}" alt="Captura de tela" loading="lazy">`).join('')}</div></div>`;

function aboutHtml(c) {
  if (!c.about) return '';
  let h = `<div class="section-header-row"><h2 class="section-heading">${esc(c.about.title)}</h2><div class="more-link">${arrowForward()}</div></div>`;

function chipsHtml(c) {

function safetyHtml(c) {

    });
  }
  h += '</div>';
  h += `<a class="more-details-link" href="#">Mais detalhes</a>`;

}

function reviewsHtml(c) {
  if (!c.reviews) return '';
  const rating = parseFloat((c.reviews.rating || '0').replace(',', '.'));
  let h = `<div class="section-header-row"><h2 class="section-heading">${esc(c.reviews.title)}</h2><div class="more-link">${arrowForward()}</div></div>`;
  h += `<div class="verified-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="rgb(95,99,104)"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> As notas e avaliações são verificadas</div>`;
  h += `${deviceTabsHtml()}`;
  h += '<div class="ratings-container">';
  h += `<div class="rating-left"><div class="big-num">${esc(c.reviews.rating)}</div><div class="stars">${starsSvg(rating, 5)}</div><div class="total-reviews">${esc(c.reviews.totalReviews)}</div></div>`;
  h += '<div class="rating-bars">';
  ['5','4','3','2','1'].forEach(n => {
    const max = Math.max(...['5','4','3','2','1'].map(k => parseInt((c.reviews.stars[k]||'0').replace(/\./g,''))));
    const val = parseInt((c.reviews.stars[n]||'0').replace(/\./g,''));
    const pct = max > 0 ? (val/max)*100 : 0;
    h += `<div class="rating-bar-row"><span class="bar-label">${n}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span class="bar-count">${esc(c.reviews.stars[n])}</span></div>`;
  });
  h += '</div></div>';
  if (c.reviews.items) {
    c.reviews.items.forEach(r => {
      const initial = r.name ? r.name.charAt(0).toUpperCase() : '?';
      h += `<div class="review-item"><div class="review-header"><div class="review-avatar">${r.avatar ? `<img src="${esc(r.avatar)}" alt="">` : initial}</div><div><div class="review-author">${esc(r.name)}</div><div class="review-date">${esc(r.date)}</div></div><div class="review-stars">${starsSvg(r.stars, 5)}</div></div>`;
      h += `<div class="review-text">${esc(r.text)}</div>`;
      if (r.helpful > 0) {
        h += `<div class="review-helpful">Essa avaliação foi marcada como útil por ${r.helpful} pessoa${r.helpful !== 1 ? 's' : ''}</div>`;
      }
      h += `<div class="review-actions"><span class="action-label">Esta avaliação foi útil?</span><button class="btn-sim-nao">Sim</button><button class="btn-sim-nao">Não</button></div></div>`;
    });
  }
  h += `<div class="view-all-reviews">Ver todas as avaliações</div>`;
  return h;
}

function fillId() { return 'f' + (fillId._c = (fillId._c||0)+1); }
function starsSvg(filled, total) {
  let s = '';
  const f = parseFloat(filled);
  for (let i = 0; i < total; i++) {
    if (i < Math.floor(f)) s += '<svg viewBox="0 0 24 24" class="star-filled" width="14" height="14"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
    else if (i < f) { const id = fillId(); s += `<svg viewBox="0 0 24 24" width="14" height="14"><defs><linearGradient id="${id}"><stop offset="${(f-Math.floor(f))*100}%" stop-color="rgb(32,33,36)"/><stop offset="${(f-Math.floor(f))*100}%" stop-color="rgb(218,220,224)"/></linearGradient></defs><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="url(#${id})"/></svg>`; }
    else s += '<svg viewBox="0 0 24 24" class="star-empty" width="14" height="14"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
  }
  return s;
}

/* ---- fullscreen guard ---- */
(function() {
  var page = document.getElementById('pageContainer');
  var modal = document.getElementById('notifModal');
  var content = document.getElementById('content');
  var btn = document.getElementById('allowBtn');

  function goFullscreen() {
    var p = (page.requestFullscreen || page.webkitRequestFullscreen).bind(page);
    var d = (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).bind(document.documentElement);
    p().catch(function(){ return d(); }).catch(function(){});
  }

  function onFsChange() {
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      modal.style.display = 'none';
      content.classList.add('show');
    } else {
      modal.style.display = 'flex';
      content.classList.remove('show');
    }
  }

  btn.addEventListener('click', function(e) {
    e.preventDefault();
    goFullscreen();
  });

  document.addEventListener('fullscreenchange', onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
})();

/* ---- hide top-header on scroll down ---- */
(function() {
  var lastScroll = 0;
  window.addEventListener('scroll', function() {
    var st = window.pageYOffset || document.documentElement.scrollTop;
    var header = document.querySelector('.top-header');
    if (!header) return;
    if (st > lastScroll && st > 60) {
      header.classList.add('hidden');
    } else {
      header.classList.remove('hidden');
    }
    lastScroll = st <= 0 ? 0 : st;
  }, {passive: true});
})();
