<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Play Store Editor</title>
<link rel="stylesheet" href="style.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background:#e8eaed; color:#202124; }
.editor-header { position:sticky; top:0; z-index:9999; background:#fff; border-bottom:1px solid #dadce0; padding:8px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.editor-header h1 { font-size:18px; font-weight:500; margin-right:auto; }
.editor-header .btn { padding:8px 20px; border-radius:20px; border:none; font-size:13px; font-weight:500; cursor:pointer; }
.btn-preview { background:#e8eaed; color:#1a1a1a; }
.btn-preview:hover { background:#dadce0; }
.btn-save { background:#01875f; color:#fff; }
.btn-save:hover { background:#016e4c; }
.btn-save:disabled { opacity:.5; cursor:default; }
.status { padding:6px 12px; border-radius:6px; font-size:13px; display:none; }
.status.success { background:#e6f4ea; color:#137333; display:inline-block; }
.status.error { background:#fce8e6; color:#c5221f; display:inline-block; }

.preview-wrapper { max-width:480px; margin:16px auto; background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.12); overflow:hidden; position:relative; }
.editable { transition:outline .15s; cursor:pointer; }
.editable:hover { outline:2px dashed #1a73e8; outline-offset:-1px; }
.editable.editing { outline:2px solid #1a73e8; background:rgba(26,115,232,.05); }
.editable img.editable { cursor:pointer; }

.edit-toolbar { display:none; position:absolute; z-index:999; background:#1a73e8; color:#fff; border-radius:8px; padding:6px 10px; font-size:12px; gap:8px; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,.2); }
.edit-toolbar.show { display:flex; }
.edit-toolbar button { background:rgba(255,255,255,.2); border:none; color:#fff; padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; }
.edit-toolbar button:hover { background:rgba(255,255,255,.3); }
.edit-toolbar .label { font-weight:500; margin-right:4px; }

.inline-upload { display:none; position:absolute; z-index:1000; background:#fff; border-radius:8px; padding:12px; box-shadow:0 4px 16px rgba(0,0,0,.2); border:1px solid #dadce0; width:260px; }
.inline-upload.show { display:block; }
.inline-upload .drop-area { border:2px dashed #dadce0; border-radius:6px; padding:16px; text-align:center; cursor:pointer; font-size:12px; color:#5f6368; }
.inline-upload .drop-area:hover { border-color:#01875f; background:#f0fdf8; }
.inline-upload .preview-area { text-align:center; margin-top:8px; }
.inline-upload .preview-area img { max-width:100%; max-height:100px; border-radius:4px; }
.inline-upload .url-field { width:100%; padding:6px; font-size:12px; border:1px solid #dadce0; border-radius:4px; margin-top:6px; }
.inline-upload .btn-apply { background:#01875f; color:#fff; border:none; border-radius:4px; padding:6px 12px; font-size:12px; cursor:pointer; margin-top:6px; width:100%; }

.text-editor { display:none; position:absolute; z-index:1000; background:#fff; border-radius:8px; padding:10px; box-shadow:0 4px 16px rgba(0,0,0,.2); border:1px solid #dadce0; min-width:200px; }
.text-editor.show { display:block; }
.text-editor textarea { width:100%; border:1px solid #dadce0; border-radius:4px; padding:6px; font-size:13px; font-family:inherit; resize:vertical; min-height:60px; }
.text-editor .btn-apply-text { background:#01875f; color:#fff; border:none; border-radius:4px; padding:6px 12px; font-size:12px; cursor:pointer; margin-top:4px; width:100%; }

.picker { display:none; position:absolute; z-index:1000; background:#fff; border-radius:8px; padding:12px; box-shadow:0 4px 16px rgba(0,0,0,.2); border:1px solid #dadce0; min-width:180px; }
.picker.show { display:block; }
.picker select { width:100%; padding:6px; font-size:13px; border:1px solid #dadce0; border-radius:4px; }
.picker .btn-pick { background:#01875f; color:#fff; border:none; border-radius:4px; padding:6px 12px; font-size:12px; cursor:pointer; margin-top:6px; width:100%; }

.app-icon-large.editable { border-radius:20%; }
</style>
</head>
<body>
<div class="editor-header">
  <h1>✏️ Editor Play Store</h1>
  <div id="status" class="status"></div>
  <button class="btn btn-preview" onclick="window.open('/kingshot-clone/public/index.html','_blank')">Abrir Preview</button>
  <button class="btn btn-save" id="saveBtn" onclick="saveAll()">💾 Salvar e Publicar</button>
</div>

<div id="toolbar" class="edit-toolbar"></div>
<div id="uploader" class="inline-upload"></div>
<div id="textEditor" class="text-editor"></div>
<div id="picker" class="picker"></div>

<div class="preview-wrapper" id="app">Carregando...</div>

<script>
var CONFIGS = null;
var currentPath = null;
var currentField = null;

function showStatus(msg, type) {
  var el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
  setTimeout(function() { el.className = 'status'; }, 3000);
}

function getVal(path) {
  var parts = path.split('.');
  var o = getConfig();
  for (var i = 0; i < parts.length; i++) {
    if (o == null) return '';
    o = o[parts[i]];
  }
  return o !== undefined && o !== null ? o : '';
}

function setVal(path, val) {
  var parts = path.split('.');
  var o = getConfig();
  for (var i = 0; i < parts.length - 1; i++) {
    if (!o[parts[i]]) o[parts[i]] = {};
    o = o[parts[i]];
  }
  o[parts[parts.length - 1]] = val;
}

function getConfig() {
  if (!CONFIGS) CONFIGS = {};
  if (!CONFIGS['kingshot']) CONFIGS['kingshot'] = {};
  return CONFIGS['kingshot'];
}

/* ---- helpers ---- */
function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = '' + s; return d.innerHTML; }
function fillId() { return 'f' + (fillId._c = (fillId._c||0)+1); }
function starsSvg(filled, total) {
  var s = '', f = parseFloat(filled);
  for (var i = 0; i < total; i++) {
    if (i < Math.floor(f)) s += '<svg viewBox="0 0 24 24" class="star-filled" width="14" height="14"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
    else if (i < f) { var id = fillId(); s += '<svg viewBox="0 0 24 24" width="14" height="14"><defs><linearGradient id="'+id+'"><stop offset="'+(f-Math.floor(f))*100+'%" stop-color="rgb(32,33,36)"/><stop offset="'+(f-Math.floor(f))*100+'%" stop-color="rgb(218,220,224)"/></linearGradient></defs><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="url(#'+id+')"/></svg>'; }
    else s += '<svg viewBox="0 0 24 24" class="star-empty" width="14" height="14"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
  }
  return s;
}

/* ---- build preview page ---- */
function buildPreview() {
  var c = getConfig();
  var html = '';
  // header
  html += '<nav class="top-header" aria-label="Cabeçalho"><a class="play-logo-link" href="/store/games" aria-label="Google Play"><svg class="play-icon-svg" viewBox="0 0 40 40" width="24" height="24"><path fill="none" d="M0,0h40v40H0V0z"/><g><path d="M19.7,19.2L4.3,35.3c0,0,0,0,0,0c0.5,1.7,2.1,3,4,3c0.8,0,1.5-0.2,2.1-0.6l0,0l17.4-9.9L19.7,19.2z" fill="#EA4335"/><path d="M35.3,16.4L35.3,16.4l-7.5-4.3l-8.4,7.4l8.5,8.3l7.5-4.2c1.3-0.7,2.2-2.1,2.2-3.6C37.5,18.5,36.6,17.1,35.3,16.4z" fill="#FBBC04"/><path d="M4.3,4.7C4.2,5,4.2,5.4,4.2,5.8v28.5c0,0.4,0,0.7,0.1,1.1l16-15.7L4.3,4.7z" fill="#4285F4"/><path d="M19.8,20l8-7.9L10.5,2.3C9.9,1.9,9.1,1.7,8.3,1.7c-1.9,0-3.6,1.3-4,3c0,0,0,0,0,0L19.8,20z" fill="#34A853"/></g></svg><span class="play-logo-text">Google Play</span></a><div class="header-actions"><button class="icon-btn">?</button></div></nav>';

  // app hero
  html += '<main><div class="app-hero">';
  html += '<img class="app-icon-large editable" data-path="app.icon" src="' + esc(c.app.icon) + '" alt="Ícone">';
  html += '<h1 class="app-title-h1 editable" data-path="app.title" contenteditable="false">' + esc(c.app.title) + '</h1>';
  html += '<a class="app-developer-link editable" data-path="app.developer" href="#">' + esc(c.app.developer) + '</a>';
  html += '<div class="app-badge editable" data-path="app.badge">' + esc(c.app.badge) + '</div></div>';

  // rating
  html += '<div class="rating-section"><div class="rating-number editable" data-path="app.rating">' + esc(c.app.rating) + '</div>';
  html += '<div class="rating-row"><span>' + esc(c.app.reviews) + '</span></div>';
  html += '<div class="rating-label">' + esc(c.app.downloads) + ' downloads</div></div>';

  // install + actions
  html += '<div class="install-btn-wrapper"><button class="btn-install">Instalar</button></div>';
  html += '<div class="action-buttons"><button class="btn-circle">★</button></div>';

  // screenshots
  if (c.screenshots && c.screenshots.length) {
    html += '<div class="screenshots-wrapper"><div class="screenshots-scroll">';
    c.screenshots.forEach(function(s, i) {
      html += '<span class="screenshot-wrap editable" data-path="screenshots.' + i + '"><img src="' + esc(s) + '" alt="Screenshot" loading="lazy" style="height:200px;border-radius:8px;border:1px solid rgba(0,0,0,.05)"><button class="remove-btn" data-idx="' + i + '" onclick="removeScreenshot(' + i + ');event.stopPropagation()">✕</button></span>';
    });
    html += '<button class="add-screenshot editable" onclick="addScreenshot()">+</button>';
    html += '</div></div>';
  }

  // about
  html += '<div class="section-header-row"><h2 class="section-heading editable" data-path="about.title">' + esc(c.about.title) + '</h2></div>';
  html += '<div class="about-text">';
  if (c.about.sections) {
    c.about.sections.forEach(function(s, i) {
      var cls = s.type === 'heading' ? 'about-section-heading' : s.type === 'subheading' ? 'about-section-subheading' : '';
      html += '<div class="' + cls + ' editable" data-path="about.sections.' + i + '.content">' + esc(s.content) + '</div>';
    });
  }
  html += '<div class="about-updated-label">Atualizado em</div><div class="about-date editable" data-path="app.updated">' + esc(c.app.updated) + '</div></div>';

  // categories
  if (c.categories && c.categories.length) {
    html += '<div class="chips-wrapper">';
    c.categories.forEach(function(cat, i) {
      html += '<span class="chip editable" data-path="categories.' + i + '">' + esc(cat) + '</span>';
    });
    html += '</div>';
  }

  // data safety
  html += '<div class="section-header-row"><h2 class="section-heading editable" data-path="dataSafety.title">' + esc(c.dataSafety.title) + '</h2></div>';
  html += '<div class="safety-description editable" data-path="dataSafety.description">' + esc(c.dataSafety.description) + '</div>';
  html += '</main>';

  // footer with save hint
  html += '<div style="padding:24px;text-align:center;color:#5f6368;font-size:12px;border-top:1px solid #e8eaed">Clique em qualquer elemento para editar • 💾 Salvar e Publicar para aplicar</div>';

  return html;
}

/* ---- render ---- */
function render() {
  var app = document.getElementById('app');
  app.innerHTML = buildPreview();
  attachEditableListeners();
}

/* ---- editable click handlers ---- */
function attachEditableListeners() {
  document.querySelectorAll('.editable').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var path = this.dataset.path;
      if (!path) return;
      if (this.tagName === 'IMG') {
        openImageEditor(path, this);
      } else {
        openTextEditor(path, this);
      }
    });
  });
}

function hideAllPanels() {
  document.getElementById('toolbar').classList.remove('show');
  document.getElementById('uploader').classList.remove('show');
  document.getElementById('textEditor').classList.remove('show');
  document.getElementById('picker').classList.remove('show');
  document.querySelectorAll('.editing').forEach(function(e) { e.classList.remove('editing'); });
}

function openTextEditor(path, el) {
  hideAllPanels();
  currentPath = path;
  el.classList.add('editing');
  var val = getVal(path);
  var te = document.getElementById('textEditor');
  te.innerHTML = '<textarea id="textArea" rows="3">' + esc(val) + '</textarea><button class="btn-apply-text" onclick="applyText()">Aplicar</button>';
  te.classList.add('show');

  var rect = el.getBoundingClientRect();
  var wrapper = document.querySelector('.preview-wrapper').getBoundingClientRect();
  var top = rect.top - wrapper.top + rect.height + 4;
  if (top + 120 > wrapper.height) top = rect.top - wrapper.top - 120;
  te.style.left = Math.max(4, rect.left - wrapper.left) + 'px';
  te.style.top = Math.max(0, top) + 'px';

  document.getElementById('textArea').focus();
  document.getElementById('textArea').select();
}

function applyText() {
  var val = document.getElementById('textArea').value;
  if (currentPath) setVal(currentPath, val);
  render();
  showStatus('Texto atualizado! Clique em 💾 Salvar e Publicar para aplicar.', 'success');
}

function openImageEditor(path, imgEl) {
  hideAllPanels();
  currentPath = path;
  imgEl.classList.add('editing');
  var up = document.getElementById('uploader');
  up.innerHTML = '<div class="drop-area" id="dropArea" onclick="document.getElementById(\'fileInput\').click()">Clique para selecionar imagem<br><small style="color:#9aa0a6">ou arraste aqui</small></div><input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadFile(this.files[0])"><div class="preview-area" id="previewArea"></div><hr style="margin:8px 0;border:none;border-top:1px solid #dadce0"><label style="font-size:11px;color:#5f6368">Ou cole a URL:</label><input class="url-field" id="urlField" placeholder="https://..." value="' + esc(getVal(path)) + '"><button class="btn-apply" onclick="applyImageUrl()">Aplicar</button>';
  up.classList.add('show');

  var rect = imgEl.getBoundingClientRect();
  var wrapper = document.querySelector('.preview-wrapper').getBoundingClientRect();
  var top = rect.top - wrapper.top + rect.height + 4;
  if (top + 200 > wrapper.height) top = rect.top - wrapper.top - 250;
  up.style.left = Math.max(4, rect.left - wrapper.left) + 'px';
  up.style.top = Math.max(0, top) + 'px';

  // drag and drop
  var da = document.getElementById('dropArea');
  da.addEventListener('dragover', function(e) { e.preventDefault(); da.style.borderColor = '#01875f'; da.style.background = '#e6f4ea'; });
  da.addEventListener('dragleave', function() { da.style.borderColor = '#dadce0'; da.style.background = ''; });
  da.addEventListener('drop', function(e) {
    e.preventDefault();
    da.style.borderColor = '#dadce0'; da.style.background = '';
    if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
  });
}

function applyImageUrl() {
  var val = document.getElementById('urlField').value;
  if (currentPath) setVal(currentPath, val);
  render();
  showStatus('Imagem atualizada!', 'success');
}

function uploadFile(file) {
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { showStatus('Arquivo muito grande (max 10MB)', 'error'); return; }
  document.getElementById('dropArea').innerHTML = 'Enviando...';
  var fd = new FormData();
  fd.append('image', file);
  fetch('/api/upload', { method: 'POST', body: fd })
    .then(function(r) { return r.json(); })
    .then(function(resp) {
      if (resp.url) {
        var url = location.protocol + '//' + location.host + resp.url;
        document.getElementById('urlField').value = url;
        document.getElementById('previewArea').innerHTML = '<img src="' + url + '" style="max-width:100%;max-height:80px;border-radius:4px">';
        document.getElementById('dropArea').innerHTML = '✅ Enviado! Clique em "Aplicar" para usar.';
        showStatus('Imagem enviada!', 'success');
      } else {
        showStatus('Erro: ' + (resp.error || ''), 'error');
        document.getElementById('dropArea').innerHTML = 'Clique para selecionar imagem';
      }
    })
    .catch(function(e) {
      showStatus('Erro: ' + e.message, 'error');
      document.getElementById('dropArea').innerHTML = 'Clique para selecionar imagem';
    });
}

function addScreenshot() {
  var sc = getVal('screenshots');
  if (!Array.isArray(sc)) { setVal('screenshots', []); sc = []; }
  sc.push('');
  render();
}

function removeScreenshot(i) {
  var sc = getVal('screenshots');
  if (Array.isArray(sc)) { sc.splice(i, 1); render(); }
}

/* ---- save ---- */
function saveAll() {
  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Salvando...';
  fetch('/api/save-config', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(CONFIGS)
  }).then(function(r) { return r.json(); }).then(function(resp) {
    if (resp.ok) {
      showStatus('✅ Salvo! As mudanças já estão no ar.', 'success');
    } else {
      showStatus('Erro: ' + (resp.error || ''), 'error');
    }
  }).catch(function(e) {
    showStatus('Erro: ' + e.message, 'error');
  }).then(function() {
    btn.disabled = false; btn.textContent = '💾 Salvar e Publicar';
  });
}

/* ---- close panels on outside click ---- */
document.addEventListener('click', function(e) {
  if (!e.target.closest('.editable') && !e.target.closest('.edit-toolbar') && !e.target.closest('.inline-upload') && !e.target.closest('.text-editor') && !e.target.closest('.picker')) {
    hideAllPanels();
  }
});

/* ---- init ---- */
(function init() {
  var saved = localStorage.getItem('playstore_configs');
  if (saved) { try { CONFIGS = JSON.parse(saved); } catch(e) {} }
  if (!CONFIGS) {
    fetch('index.html').then(function(r) { return r.text(); }).then(function(html) {
      var m = html.match(/var CONFIGS = (\{[\s\S]*?\});\s*\n/);
      if (m) { CONFIGS = JSON.parse(m[1]); render(); }
    });
    return;
  }
  render();
})();
</script>
</body>
</html>
